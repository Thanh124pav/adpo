defaults:
  - _self_

# --- ADPO-specific algorithm config ---
algorithm:
  adv_estimator: grpo
  gamma: 1.0
  lam: 1.0
  norm_adv_by_std_in_grpo: true
  # Phase Decomposition
  phase_method: adaptive       # "adaptive" (percentile on -log pi), "threshold" (fixed delta), "entropy" (percentile on token entropy)
  phase_delta: 2.0             # Fixed threshold for -log pi (if method=threshold)
  phase_percentile: 85.0       # Percentile threshold (adaptive: on -log pi; entropy: 80=top 20% highest entropy are breakpoints)
  phase_min_len: 10            # Minimum tokens per phase
  phase_max_K: 10              # Maximum number of phases per response
  phase_sigma: 0.0             # Soft assignment bandwidth. 0=hard, >0=Gaussian blend
  # LLM-as-Judge
  judge_type: endpoint          # "rule", "vllm", "api" (openai SDK), "endpoint" (raw HTTP)
  judge_model: Qwen3-14B       # Model for vllm/api/endpoint judge
  judge_endpoint: ""           # HTTP endpoint for "endpoint" judge
  max_ref_solutions_in_prompt: 3
  # SolutionBank
  max_solutions_per_question: 8
  solution_bank_dir: data/solutions
  solution_bank_save_path: checkpoints/solution_bank.jsonl
  solution_bank_save_freq: 50
  # KL
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    type: fixed
    kl_coef: 0.001
    horizon: 10000
    target_kl: 0.1
  # PF-PPO (disabled)
  use_pf_ppo: false
  pf_ppo:
    reweight_method: pow
    weight_pow: 2.0
  # Rollout correction
  rollout_correction:
    enabled: false

# --- Actor / Rollout / Ref ---
actor_rollout_ref:
  hybrid_engine: true
  nccl_timeout: 600
  model:
    path: Qwen3-4B
    use_shm: false
    external_lib: null
    override_config: {}
    enable_gradient_checkpointing: true
    enable_activation_offload: false
    use_remove_padding: false
    lora_rank: 0          # Set >0 to enable LoRA (e.g. 32, 64)
    lora_alpha: 16
    target_modules: all-linear
    use_liger: false
    use_fused_kernels: false
    trust_remote_code: false
  actor:
    strategy: fsdp
    ppo_mini_batch_size: 128
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: null
    use_dynamic_bsz: false
    ppo_max_token_len_per_gpu: 16384
    grad_clip: 1.0
    clip_ratio: 0.2
    clip_ratio_low: 0.2
    clip_ratio_high: 0.2
    clip_ratio_c: 3.0
    loss_agg_mode: seq-mean-token-sum-norm
    entropy_coeff: 0.0
    use_invalid_action_penalty: false
    invalid_action_penalty_coef: 0.1
    use_kl_loss: true
    use_torch_compile: false
    kl_loss_coef: 0.001
    kl_loss_type: low_var_kl
    ppo_epochs: 1
    shuffle: false
    ulysses_sequence_parallel_size: 1
    policy_loss:
      loss_mode: "vanilla"
    checkpoint:
      contents: ['model', 'optimizer', 'extra']
    optim:
      lr: 1e-6
      lr_warmup_steps: -1
      lr_warmup_steps_ratio: 0.
      min_lr_ratio: 0.0
      num_cycles: 0.5
      warmup_style: constant
      total_training_steps: -1
      weight_decay: 0.01
    fsdp_config:
      wrap_policy:
        min_num_params: 0
      param_offload: false
      optimizer_offload: false
      offload_policy: false
      reshard_after_forward: true
      fsdp_size: -1
  rollout:
    name: vllm
    mode: sync
    temperature: 1.0
    top_p: 1.0
    top_k: -1
    use_fire_sampling: false
    prompt_length: ${data.max_prompt_length}
    response_length: ${data.max_response_length}
    dtype: bfloat16
    gpu_memory_utilization: 0.4
    ignore_eos: false
    enforce_eager: true
    free_cache_engine: true
    load_format: dummy_dtensor
    layered_summon: false
    tensor_model_parallel_size: 1
    max_num_batched_tokens: 8192
    max_model_len: null
    max_num_seqs: 1024
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    disable_log_stats: true
    enable_chunked_prefill: true
    do_sample: true
    n: 8
    val_kwargs:
      top_k: -1
      top_p: 1.0
      temperature: 0
      n: 1
      do_sample: false
  ref:
    strategy: fsdp
    fsdp_config:
      param_offload: true
      reshard_after_forward: true
      wrap_policy:
        min_num_params: 0
    use_torch_compile: ${actor_rollout_ref.actor.use_torch_compile}
    log_prob_micro_batch_size: null
    log_prob_micro_batch_size_per_gpu: null
    log_prob_use_dynamic_bsz: ${actor_rollout_ref.actor.use_dynamic_bsz}
    log_prob_max_token_len_per_gpu: ${actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
    ulysses_sequence_parallel_size: ${actor_rollout_ref.actor.ulysses_sequence_parallel_size}

# --- Critic (disabled for GRPO, but verl requires the key) ---
critic:
  strategy: fsdp

# --- Reward model (disabled, using custom reward function) ---
reward_model:
  enable: false
  enable_resource_pool: false
  strategy: fsdp
  n_gpus_per_node: 0
  nnodes: 1
  reward_kwargs: {}

# --- Reward manager ---
reward_manager:
  reward_fn_key: data_source
  default_reward_fn:
    cls: identity
    kwargs: {}
  overrides: {}
  verbose: false

# --- Data ---
data:
  train_files: data/processed/train/math.parquet
  val_files: data/processed/eval/math500.parquet
  train_batch_size: 128
  max_prompt_length: 1024
  max_response_length: 2048
  shuffle: true
  trust_remote_code: false

# --- Custom reward function ---
custom_reward_function:
  path: adpo/reward_functions.py
  name: compute_score

# --- Trainer ---
trainer:
  total_epochs: 3
  total_training_steps: null
  balance_batch: true
  save_freq: 50
  test_freq: 50
  log_freq: 1
  project_name: adpo
  experiment_name: adpo-qwen-7b-math
  logger:
    - tensorboard
  log_val_generations: 0
  rollout_data_dir: null
  validation_data_dir: null
  default_local_dir: checkpoints/
  default_hdfs_dir: null
  del_local_ckpt_after_load: false
  max_actor_ckpt_to_keep: null
  max_critic_ckpt_to_keep: null
  nnodes: 1
  n_gpus_per_node: 8
  device: cuda
  use_legacy_worker_impl: auto
  resume_mode: auto
  resume_from_path: null
  val_before_train: true
  val_only: false
  critic_warmup: 0
  ray_wait_register_center_timeout: 300
  esi_redundant_time: 0

# --- Profiler ---
global_profiler:
  tool: null
  steps: null
  profile_continuous_steps: false
  save_path: "outputs/profile"
  global_tool_config:
    nsys:
      discrete: false
      controller_nsight_options:
        trace: "cuda,nvtx,cublas,ucx"
        cuda-memory-usage: "true"
        cuda-graph-trace: "graph"
      worker_nsight_options:
        trace: "cuda,nvtx,cublas,ucx"
        cuda-memory-usage: "true"
        cuda-graph-trace: "graph"
        capture-range: "cudaProfilerApi"
        capture-range-end: null
        kill: none
    torch_memory:
      trace_alloc_max_entries: 100000
      stack_depth: 32
      context: "all"
      stacks: "all"
      kw_args: {}

# --- Transfer queue ---
transfer_queue:
  enable: false

# --- Resources ---
resources:
  num_gpus: 8

# --- Ray ---
ray_kwargs:
  ray_init:
    num_cpus: null
  timeline_json_file: null
