# DEPRECATED — use configs/adpo_unified.yaml with pipeline_reward: judge
# Kept for backward compatibility only.
#
# Inherit from verl's ppo_trainer.yaml — only override what ADPO needs.
# All fields not listed here use verl's defaults.

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

# --- ADPO-specific algorithm extensions ---
# Fields like gamma, lam, kl_ctrl, use_pf_ppo etc. are inherited from ppo_trainer.
algorithm:
  adv_estimator: grpo
  # Phase Decomposition
  phase_method: adaptive
  phase_delta: 2.0
  phase_percentile: 85.0
  phase_min_len: 10
  phase_max_K: 10
  phase_decay_gamma: 0.0       # 0 = off, >0 = in-phase decreasing (e.g. 0.9)
  # Score mapping
  correct_reward_floor: 0.5    # Min phase reward for correct responses
  # Overlong reward shaping (DAPO-style)
  overlong_buffer_len: 0       # 0 = off, >0 = soft penalty buffer (e.g. 4096)
  overlong_penalty_factor: 1.0 # Max penalty when response exceeds buffer
  # Output phase reward (after </think>)
  output_correct_reward: 0.5   # Reward for output phase when answer is correct
  output_incorrect_reward: 0.0 # Reward for output phase when answer is wrong
  # LLM-as-Judge
  judge_type: endpoint
  judge_model: Qwen3-14B
  judge_endpoint: ""
  # Golden Path generation (for answer-only datasets)
  golden_path_enabled: false
  golden_path_endpoint: ""       # defaults to judge_endpoint if empty
  golden_path_model: ""          # defaults to judge_model if empty
  golden_path_mode: endpoint     # "endpoint" or "vllm"
  golden_path_cache_dir: data/golden_paths
  golden_path_max_attempts: 3
  # Trajectory Stitching (active when golden_path_enabled=true)
  stitch_reward_decay: 0.1       # reward decay per golden extension (1.0 -> 0.9 -> 0.8)
  stitch_max_extensions: 5       # max golden phases to extend before giving up
  stitch_splice_boost: 2.0       # advantage multiplier at splice point
  stitch_post_splice_decay: 0.9  # geometric decay of positive advantage after splice

# --- Actor / Rollout / Ref overrides ---
actor_rollout_ref:
  model:
    path: Qwen3-4B
  actor:
    ppo_mini_batch_size: 128
    use_kl_loss: true
    use_torch_compile: false
    loss_agg_mode: seq-mean-token-sum-norm
    lr: 1e-6
    lr_warmup_steps_ratio: 0.0    # fraction of total steps for warmup
    # lr_warmup_steps: -1         # override warmup by step count (-1 = use ratio)
    ppo_epochs: 1                 # PPO epochs per rollout batch
    clip_ratio: 0.2               # PPO clip epsilon
    entropy_coeff: 0.0            # entropy bonus coefficient
  rollout:
    name: vllm
    n: 8
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.4
    enforce_eager: true
    repetition_penalty: 1.05    # penalize repeated tokens (1.0 = off)
  ref:
    fsdp_config:
      param_offload: true

# --- Data ---
data:
  train_files: data/processed/train/math.parquet
  val_files: data/processed/eval/math500.parquet
  train_batch_size: 128
  max_prompt_length: 1024
  max_response_length: 2048

# --- Reward (new verl structure) ---
reward:
  custom_reward_function:
    path: adpo/reward_functions.py
    name: compute_score
  reward_model:
    enable: false

# --- Trainer overrides ---
trainer:
  total_epochs: 3
  save_freq: 50
  test_freq: 50
  project_name: adpo
  experiment_name: adpo-qwen-7b-math
  logger:
    - tensorboard
  default_local_dir: checkpoints/
