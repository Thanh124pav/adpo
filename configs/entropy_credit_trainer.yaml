# DEPRECATED — use configs/adpo_unified.yaml with pipeline_reward: entropy
# Kept for backward compatibility only.
#
# Entropy-Credit Trainer Config
# Inherits from verl's ppo_trainer.yaml.
#
# Key differences from pure-entropy:
# - No attention reconstruction, no extra HF model needed
# - Credit assignment via cumulative entropy thresholds
# - Much faster (no forward pass for hidden states)

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - ppo_trainer
  - _self_

# --- Entropy-Credit algorithm config ---
algorithm:
  adv_estimator: grpo

  # Phase boundary detection (same as pure-entropy)
  entropy_window_size: 10        # k: sliding window size for entropy averaging
  entropy_percentile: 75.0       # Percentile threshold for window means
  phase_min_len: 10              # Minimum tokens between phase boundaries
  phase_max_K: 10                # Maximum number of phases per response

  # Entropy credit assignment
  psi: 0.95                      # Decay factor for cumulative entropy (1.0 = no decay)
  default_threshold_percentile: 90.0  # Percentile for threshold when all responses wrong

  # Total reward budget (sum of all phase rewards per response)
  correct_total: 1.0              # sum(r_i) when answer is correct
  incorrect_total: -1.0           # sum(r_i) when answer is wrong
  partial_total: 0.1              # sum(r_i) when partial/no answer

  # Advantage decay within phase
  decay_gamma: 0.0               # 0 = hard assignment, >0 = in-phase decreasing (e.g. 0.9)

# --- Actor / Rollout / Ref ---
actor_rollout_ref:
  model:
    path: Qwen3-4B
  actor:
    ppo_mini_batch_size: 128
    use_kl_loss: true
    use_torch_compile: false
    loss_agg_mode: seq-mean-token-sum-norm
  rollout:
    name: vllm
    n: 8
    tensor_model_parallel_size: 1
    gpu_memory_utilization: 0.4
    enforce_eager: true
  ref:
    fsdp_config:
      param_offload: true

# --- Data ---
data:
  train_files: data/processed/train/math.parquet
  val_files: data/processed/eval/math500.parquet
  train_batch_size: 128
  max_prompt_length: 1024
  max_response_length: 2048

# --- Reward ---
reward:
  custom_reward_function:
    path: adpo/reward_functions.py
    name: compute_score
  reward_model:
    enable: false

# --- Trainer ---
trainer:
  total_epochs: 3
  save_freq: 50
  test_freq: 50
  project_name: entropy-credit
  experiment_name: entropy-credit-math
  logger:
    - tensorboard
  default_local_dir: checkpoints/
